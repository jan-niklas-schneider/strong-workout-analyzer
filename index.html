<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workout Analyzer</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>Workout Analyzer</h1>
      <p>Upload your Strong CSV exports to analyze workouts and bodyweight directly in your browser.</p>
    </header>

    <section class="card controls">
      <div class="upload">
        <label for="workoutsFile">Workouts CSV</label>
        <input type="file" id="workoutsFile" accept=".csv">
      </div>

      <div class="upload">
        <label for="weightFile">Bodyweight CSV (optional)</label>
        <input type="file" id="weightFile" accept=".csv">
      </div>

      <button id="analyzeBtn">Analyze</button>
      <div id="status" class="status"></div>
    </section>

    <section>
      <h2>Overview</h2>
      <div class="grid two">
        <div id="workoutsPerWeek" class="card chart"></div>
        <div id="volumePerWeek" class="card chart"></div>
      </div>
      <div id="weightChart" class="card chart hidden"></div>
    </section>

    <section>
      <h2>Exercises</h2>
      <div class="card">
        <div id="exerciseTable"></div>
      </div>
      <div id="exerciseCharts" class="grid two"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
