<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workout Analyzer</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="icon" href="assets/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <header class="header">
      <h1>Workout Analyzer</h1>
      <p>Upload your Strong CSV exports to analyze workouts and bodyweight directly in your browser.</p>
    </header>

    <section class="card controls">
      <div class="upload">
        <label for="workoutsFile">Workouts CSV</label>
        <div class="file-picker">
          <input type="file" id="workoutsFile" accept=".csv">
          <button type="button" id="workoutsFileBtn">Choose file</button>
          <span id="workoutsFileName" class="file-name">No file selected</span>
        </div>
      </div>

      <div class="upload">
        <label for="weightFile">Bodyweight CSV (optional)</label>
        <div class="file-picker">
          <input type="file" id="weightFile" accept=".csv">
          <button type="button" id="weightFileBtn">Choose file</button>
          <span id="weightFileName" class="file-name">No file selected</span>
        </div>
      </div>

      <details id="overviewFilterPanel" class="filter-panel hidden">
        <summary class="filter-toggle">
          <span class="filter-toggle-label">Date filter</span>
          <span id="overviewRangeLabel" class="muted filter-summary"></span>
        </summary>
        <div class="filter-dropdown">
          <label class="inline-select" for="overviewPresetSelect">
            <span>Preset</span>
            <select id="overviewPresetSelect">
              <option value="all">All time</option>
              <option value="30">Last 30 days</option>
              <option value="90">Last 90 days</option>
              <option value="180">Last 6 months</option>
              <option value="365">Last 12 months</option>
            </select>
          </label>
          <div class="filter-sliders">
            <label class="range-field" for="overviewStartRange">
              <span id="overviewStartLabel">Start</span>
              <input type="range" id="overviewStartRange">
            </label>
            <label class="range-field" for="overviewEndRange">
              <span id="overviewEndLabel">End</span>
              <input type="range" id="overviewEndRange">
            </label>
          </div>
        </div>
      </details>

      <button id="analyzeBtn">Analyze</button>
      <div id="status" class="status"></div>
    </section>

    <section>
      <h2>Overview</h2>

      <div class="overview-grid">
        <div class="grid two">
          <div id="workoutsPerWeek" class="card chart"></div>
          <div id="volumePerWeek" class="card chart"></div>
        </div>

        <div id="weightChart" class="card chart hidden"></div>
        <div id="muscleGroupVolume" class="card chart hidden"></div>
      </div>
    </section>

    <section>
      <h2>Exercises</h2>

      <div class="exercise-layout">
        <div class="exercise-main">
          <div class="card exercise-selector-card">
            <div class="exercise-selector-row">
              <label for="exerciseSelect">Select exercise</label>
              <select id="exerciseSelect"></select>
            </div>
          </div>

          <div id="exerciseCharts" class="grid two"></div>
        </div>

        <div class="card exercise-list-card">
          <div class="exercise-list-header">
            <h3>Exercises</h3>
          </div>
          <div id="exerciseTable"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
